<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Mestre da Robótica — Área de Membros</title>
<style>
  :root {
    --bg: #0a1628;
    --bg2: #0d1f3c;
    --card: #111e35;
    --card-hover: #162844;
    --gold: #f5c842;
    --gold2: #e8b820;
    --cyan: #00d4ff;
    --cyan2: #00aacc;
    --white: #f0f4ff;
    --muted: #8a9ab8;
    --green: #00e676;
    --orange: #ff9800;
    --red: #ff5252;
    --border: #1e3058;
    --modal-bg: #0a1628ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #06101e 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 1.1rem; font-weight: 700; color: var(--gold);
    letter-spacing: 0.5px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
  }
  .logo-sub { font-size: 0.7rem; color: var(--muted); font-weight: 400; display: block; }
  .lang-toggle {
    display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .lang-btn {
    padding: 8px 16px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
    border: none; background: transparent; color: var(--muted);
    transition: all 0.2s;
  }
  .lang-btn.active { background: var(--gold); color: #0a1628; }
  .lang-btn:hover:not(.active) { background: var(--border); color: var(--white); }

  /* HERO BANNER */
  .hero-banner { width: 100%; line-height: 0; }
  .hero-banner img { width: 100%; height: auto; display: block; }

  /* START HERE */
  .start-here {
    position: relative; cursor: pointer; line-height: 0;
    border-bottom: 1px solid var(--border);
  }
  .start-here img { width: 100%; height: auto; display: block; }
  .start-here-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(10,22,40,0.85));
    padding: 32px 24px 24px; text-align: center;
  }
  .start-here-btn {
    display: inline-block; background: var(--gold); color: #0a1628;
    font-weight: 800; font-size: 1rem; padding: 12px 32px;
    border-radius: 30px; letter-spacing: 0.5px;
    box-shadow: 0 4px 20px rgba(245,200,66,0.4);
  }

  /* PROJECTS GRID */
  .section { padding: 48px 24px; max-width: 1200px; margin: 0 auto; }
  .section-title {
    font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 8px;
  }
  .section-title span { color: var(--cyan); }
  .section-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,212,255,0.12);
    border-color: rgba(0,212,255,0.4);
  }
  .card-thumb {
    height: 180px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-thumb svg { width: 80px; height: 80px; opacity: 0.9; }
  .card-level {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.6); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px;
    color: var(--orange); text-transform: uppercase;
  }
  .card-level.iniciante { color: var(--green); }
  .card-time {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.6); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 0.7rem; color: var(--muted);
  }
  .card-body { padding: 20px; }
  .card-num {
    font-size: 0.7rem; font-weight: 700; color: var(--cyan); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .card h3 { font-size: 1.05rem; font-weight: 800; color: var(--white); margin-bottom: 8px; line-height: 1.3; }
  .card p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .mini-badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px;
    border-radius: 10px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
    color: var(--cyan);
  }
  .mini-badge.gold { background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.2); color: var(--gold); }
  .card-btn {
    width: 100%; padding: 10px; background: linear-gradient(135deg, var(--cyan2), var(--cyan));
    color: #0a1628; border: none; border-radius: 8px; font-weight: 700;
    font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s;
  }
  .card-btn:hover { opacity: 0.9; }
  .card-btn.gold-btn { background: linear-gradient(135deg, var(--gold2), var(--gold)); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--modal-bg); z-index: 1000;
    overflow-y: auto; padding: 20px;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
    max-width: 820px; width: 100%; margin: auto;
    overflow: hidden; position: relative;
  }
  .modal-header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .modal-close {
    position: absolute; top: 20px; right: 24px;
    background: var(--border); border: none; color: var(--white);
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(255,82,82,0.3); }
  .modal-tag {
    font-size: 0.7rem; font-weight: 700; color: var(--cyan); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .modal-header h2 { font-size: 1.6rem; font-weight: 900; color: var(--gold); margin-bottom: 12px; }
  .modal-meta { display: flex; gap: 16px; flex-wrap: wrap; }
  .meta-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.82rem; color: var(--muted);
  }
  .meta-item span { color: var(--white); font-weight: 600; }
  .modal-body { padding: 32px; }
  .modal-section { margin-bottom: 32px; }
  .modal-section-title {
    font-size: 1rem; font-weight: 800; color: var(--cyan); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }
  .modal-section-title .icon { font-size: 1.1rem; }
  .modal-desc { color: var(--muted); line-height: 1.7; font-size: 0.92rem; }
  .materials-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px;
  }
  .material-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 0.82rem; color: var(--white);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .material-item::before { content: '▸'; color: var(--gold); flex-shrink: 0; }
  .tools-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .tool-chip {
    background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.2);
    color: var(--gold); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600;
  }
  .stages { display: flex; flex-direction: column; gap: 16px; }
  .stage {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; display: flex; gap: 16px; align-items: flex-start;
  }
  .stage-num {
    min-width: 36px; height: 36px; background: linear-gradient(135deg, var(--cyan2), var(--cyan));
    color: #0a1628; border-radius: 50%; font-weight: 900; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stage-content h4 { font-size: 0.9rem; font-weight: 700; color: var(--white); margin-bottom: 6px; }
  .stage-content p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
  .stage-content ul { list-style: none; padding: 0; }
  .stage-content li { font-size: 0.82rem; color: var(--muted); padding: 3px 0; }
  .stage-content li::before { content: '→ '; color: var(--cyan); }
  .errors-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .errors-table th {
    background: var(--card); color: var(--cyan); font-weight: 700; padding: 10px 14px;
    text-align: left; border-bottom: 1px solid var(--border);
  }
  .errors-table td { padding: 10px 14px; border-bottom: 1px solid rgba(30,48,88,0.5); color: var(--muted); vertical-align: top; }
  .errors-table tr:hover td { background: rgba(255,255,255,0.02); }
  .errors-table td:first-child { color: var(--red); font-weight: 600; }
  .glossary-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px;
  }
  .gloss-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px;
  }
  .gloss-term { font-size: 0.82rem; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
  .gloss-def { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .links-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .link-chip {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 14px; font-size: 0.82rem; color: var(--cyan); font-weight: 600;
    text-decoration: none; transition: background 0.2s;
  }
  .link-chip:hover { background: var(--card-hover); }
  .safety-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .safety-list li {
    background: rgba(255,82,82,0.05); border: 1px solid rgba(255,82,82,0.2);
    border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--muted);
    display: flex; gap: 10px;
  }
  .safety-list li::before { content: '⚠'; color: var(--orange); flex-shrink: 0; }
  .extras-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .extras-list li {
    background: rgba(0,230,118,0.05); border: 1px solid rgba(0,230,118,0.2);
    border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--muted);
    display: flex; gap: 10px;
  }
  .extras-list li::before { content: '⭐'; flex-shrink: 0; }
  .chapters-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .chapters-list li {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; font-size: 0.85rem; color: var(--muted);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .ch-num { color: var(--cyan); font-weight: 700; min-width: 30px; }
  .ch-title { color: var(--white); font-weight: 600; }
  .ch-desc { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }
  .tip-box {
    background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px; padding: 16px 20px; font-size: 0.85rem; color: var(--muted);
    line-height: 1.6; font-style: italic; margin-top: 16px;
  }
  .tip-box strong { color: var(--cyan); }
  .circuit-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; font-size: 0.85rem; color: var(--muted); line-height: 1.8;
  }
  .circuit-box code { color: var(--cyan); background: rgba(0,212,255,0.1); padding: 2px 6px; border-radius: 4px; }

  /* ── MODAL HERO ──────────────────────────────────────────────── */
  .modal-hero {
    background: linear-gradient(145deg, #0d1f3c 0%, #091428 60%, #06101e 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: relative; overflow: hidden;
  }
  .modal-hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 85% 50%, rgba(0,212,255,0.08) 0%, transparent 65%),
                radial-gradient(ellipse at 15% 80%, rgba(245,200,66,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .modal-hero-close {
    position: absolute; top: 20px; right: 24px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--white); width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; z-index: 2;
  }
  .modal-hero-close:hover { background: rgba(255,82,82,0.25); }
  .modal-hero-row { display: flex; gap: 24px; align-items: center; }
  .modal-hero-art {
    flex-shrink: 0; width: 110px; height: 110px;
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(245,200,66,0.08));
    border: 1px solid rgba(0,212,255,0.2); border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .modal-hero-art::after {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent 60%);
  }
  .modal-hero-art svg { width: 80px; height: 80px; }
  .modal-hero-info { flex: 1; }
  .modal-hero-tag {
    font-size: 0.68rem; font-weight: 800; color: var(--cyan); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .modal-hero-title {
    font-size: 1.55rem; font-weight: 900; color: var(--gold);
    line-height: 1.2; margin-bottom: 14px;
  }
  .modal-hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .hero-badge {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 5px 12px; font-size: 0.78rem; color: var(--muted);
  }
  .hero-badge strong { color: var(--white); }

  /* ── MATERIAIS V2 ─────────────────────────────────────────────── */
  .section-block { margin-bottom: 28px; }
  .section-head {
    font-size: 0.82rem; font-weight: 800; color: var(--cyan); letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .section-head svg { width: 16px; height: 16px; flex-shrink: 0; }
  .mat-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;
  }
  .mat-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px;
    transition: border-color 0.2s;
  }
  .mat-item:hover { border-color: rgba(0,212,255,0.25); }
  .mat-icon { font-size: 1.2rem; flex-shrink: 0; line-height: 1; margin-top: 1px; }
  .mat-text { font-size: 0.8rem; color: var(--white); line-height: 1.4; }

  /* ── FERRAMENTAS V2 ───────────────────────────────────────────── */
  .tool-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .tool-pill {
    background: rgba(245,200,66,0.07); border: 1px solid rgba(245,200,66,0.2);
    color: var(--gold); border-radius: 20px; padding: 6px 14px;
    font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .tool-pill-icon { font-size: 0.95rem; }

  /* ── PASSOS V2 ────────────────────────────────────────────────── */
  .steps-list { display: flex; flex-direction: column; gap: 12px; }
  .step-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; display: flex;
    transition: border-color 0.2s;
  }
  .step-card:hover { border-color: rgba(0,212,255,0.3); }
  .step-accent { width: 4px; flex-shrink: 0; }
  .step-inner { flex: 1; padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; }
  .step-num {
    min-width: 34px; height: 34px; border-radius: 50%;
    font-weight: 900; font-size: 0.85rem; color: #0a1628;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-body { flex: 1; }
  .step-title { font-size: 0.88rem; font-weight: 700; color: var(--white); margin-bottom: 5px; }
  .step-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.55; }
  .step-illus {
    flex-shrink: 0; width: 56px; height: 56px;
    background: rgba(255,255,255,0.03); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .step-illus svg { width: 44px; height: 44px; }

  /* ── ERROS V2 ─────────────────────────────────────────────────── */
  .err-list { display: flex; flex-direction: column; gap: 10px; }
  .err-card {
    background: var(--card); border: 1px solid rgba(255,82,82,0.2); border-radius: 12px;
    overflow: hidden;
  }
  .err-head {
    background: rgba(255,82,82,0.08); padding: 10px 14px;
    font-size: 0.82rem; font-weight: 700; color: var(--red);
    display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,82,82,0.15);
  }
  .err-body { padding: 10px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .err-col-title {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  .err-col-text { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
  .err-cause .err-col-title { color: var(--orange); }
  .err-sol .err-col-title { color: var(--green); }

  /* ── SEGURANÇA V2 ─────────────────────────────────────────────── */
  .safety-cards { display: flex; flex-direction: column; gap: 8px; }
  .safety-card {
    background: rgba(255,152,0,0.06); border: 1px solid rgba(255,152,0,0.2);
    border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.82rem; color: var(--muted); line-height: 1.45;
  }
  .safety-icon { flex-shrink: 0; font-size: 1rem; }

  /* ── EXTRAS V2 ────────────────────────────────────────────────── */
  .extras-cards { display: flex; flex-direction: column; gap: 8px; }
  .extra-card {
    background: rgba(0,230,118,0.05); border: 1px solid rgba(0,230,118,0.18);
    border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.82rem; color: var(--muted); line-height: 1.45;
  }
  .extra-icon { flex-shrink: 0; font-size: 1rem; }

  /* ── MODAL BODY V2 ────────────────────────────────────────────── */
  .modal-body-v2 { padding: 24px 28px; }
  .modal-desc-v2 {
    font-size: 0.88rem; color: var(--muted); line-height: 1.7;
    background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.12);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 24px;
  }

  /* ── THUMBS ────────────────────────────────────────────────────── */
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb-svg { background: linear-gradient(135deg, #0d2a4a, #1a3a6a); display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
  .thumb-guia { background: linear-gradient(135deg, #0d2a4a, #1a3a6a); }
  .thumb-aranha { background: linear-gradient(135deg, #1a0a2a, #2a1540); }
  .thumb-semaforo { background: linear-gradient(135deg, #0a1a0a, #1a3a1a); }

  /* FOOTER */
  footer {
    text-align: center; padding: 32px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 0.8rem;
  }
  footer span { color: var(--gold); }

  @media (max-width: 600px) {
    .hero { padding: 40px 16px 32px; }
    .section { padding: 32px 16px; }
    .modal-body, .modal-header { padding: 20px; }
    .materials-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      Kit Mestre da Robótica
      <span class="logo-sub" data-i18n="area_membros">Área de Membros</span>
    </div>
  </div>

let lang = localStorage.getItem('kmr_lang') || 'pt';

function t(key) { return i18n[lang][key] || key; }

function setLang(l) {
  lang = l;
  localStorage.setItem('kmr_lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.getElementById('btn-pt').classList.toggle('active', l === 'pt');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = projects.map(p => {
    const d = p[lang];
    const isGold = p.isGuia;
    return `<div class="card" onclick="openProject(${p.id})">
      <div class="card-thumb" style="${p.img ? '' : 'background:linear-gradient(135deg,#0d2a4a,#1a3a6a)'}">
        ${p.img ? `<img src="${p.img}" alt="${d.title}">` : `<div class="card-thumb-svg">${p.icon}</div>`}
        <span class="card-level ${d.level === 'iniciante' ? 'iniciante' : ''}">${d.levelLabel}</span>
        <span class="card-time">${d.time !== '—' ? '⏱ ' + d.time + ' ' + t('horas') : '📖 Guia'}</span>
      </div>
      <div class="card-body">
        <div class="card-num">${d.num}</div>
        <h3>${d.title}</h3>
        <p>${d.desc.substring(0, 110)}…</p>
        <div class="card-badges">
          ${d.tags.map(tag => `<span class="mini-badge ${isGold ? 'gold' : ''}">${tag}</span>`).join('')}
        </div>
        <button class="card-btn ${isGold ? 'gold-btn' : ''}">${t(d.btnKey)} →</button>
      </div>
    </div>`;
  }).join('');
}

function toolIcon(t) {
  const s = (t||'').toLowerCase();
  if (s.includes('tesoura') || s.includes('tijera')) return '✂️';
  if (s.includes('cola') || s.includes('silicona') || s.includes('pistola')) return '🔫';
  if (s.includes('estilete') || s.includes('cúter')) return '🔪';
  if (s.includes('alicate')) return '🔧';
  if (s.includes('régua') || s.includes('regla')) return '📏';
  if (s.includes('lápis') || s.includes('lápiz')) return '✏️';
  if (s.includes('lixa')) return '🪨';
  if (s.includes('furador') || s.includes('estilete')) return '🔩';
  return '🛠️';
}

const STEP_PALETTE = ['#00d4ff','#f5c842','#00e676','#ff9800','#a78bfa','#f87171','#34d399','#60a5fa','#fb923c','#e879f9','#4ade80','#38bdf8'];

function stepIllus(title, idx) {
  const c = STEP_PALETTE[idx % STEP_PALETTE.length];
  const s = (title||'').toLowerCase();

  // Wiring / electrical
  if (s.match(/ligaç|ligando|elétric|eléctric|conecte|circuito|fios|cables|interruptor|bateria|pilha/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="10" cy="22" r="6" fill="${c}" opacity="0.25" stroke="${c}" stroke-width="1.5"/>
      <circle cx="34" cy="22" r="6" fill="${c}" opacity="0.25" stroke="${c}" stroke-width="1.5"/>
      <path d="M16 22 Q22 10 28 22" stroke="${c}" stroke-width="2" fill="none"/>
      <path d="M16 22 Q22 34 28 22" stroke="${c}" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="22" cy="22" r="3.5" fill="${c}"/>
    </svg>`;

  // Testing
  if (s.match(/test|ligue|ligue o|hora do|hora del|testando/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="18" stroke="${c}" stroke-width="1.5" opacity="0.25"/>
      <path d="M11 22 L19 30 L33 14" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  // Motor / wheels / propeller
  if (s.match(/motor|roda|rueda|eixo|eje|hélice|instalando|instalación/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="16" fill="${c}" opacity="0.1" stroke="${c}" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="7" fill="${c}" opacity="0.3" stroke="${c}" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="3" fill="${c}"/>
      <line x1="22" y1="6" x2="22" y2="38" stroke="${c}" stroke-width="1" opacity="0.35"/>
      <line x1="6" y1="22" x2="38" y2="22" stroke="${c}" stroke-width="1" opacity="0.35"/>
    </svg>`;

  // Cutting / base / measuring
  if (s.match(/recorte|corte|base|preparando|preparación|medindo|régua|régua/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <path d="M8 36 L36 8" stroke="${c}" stroke-width="1.5" opacity="0.5"/>
      <circle cx="9" cy="34" r="5" fill="${c}" opacity="0.3" stroke="${c}" stroke-width="1.5"/>
      <circle cx="9" cy="24" r="5" fill="${c}" opacity="0.3" stroke="${c}" stroke-width="1.5"/>
      <path d="M14 28 L36 8" stroke="${c}" stroke-width="1.5"/>
    </svg>`;

  // Gluing / fixing / assembling
  if (s.match(/cole|pegue|fixe|prenda|coloque|posicione|fixando|instalando/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <rect x="10" y="26" width="24" height="10" rx="3" fill="${c}" opacity="0.2" stroke="${c}" stroke-width="1.5"/>
      <path d="M22 26 L22 10" stroke="${c}" stroke-width="2"/>
      <path d="M14 18 L22 10 L30 18" stroke="${c}" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <circle cx="22" cy="10" r="3" fill="${c}"/>
    </svg>`;

  // Building / constructing
  if (s.match(/construindo|montando|monte|criando|estrutura|construção|colunas|torre|suporte/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <rect x="6" y="26" width="12" height="14" rx="2" fill="${c}" opacity="0.25" stroke="${c}" stroke-width="1.5"/>
      <rect x="16" y="18" width="12" height="22" rx="2" fill="${c}" opacity="0.25" stroke="${c}" stroke-width="1.5"/>
      <rect x="26" y="22" width="12" height="18" rx="2" fill="${c}" opacity="0.25" stroke="${c}" stroke-width="1.5"/>
    </svg>`;

  // Hydraulic / syringe
  if (s.match(/seringa|hidráulic|mangueira|água|pressão|água/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <rect x="8" y="18" width="28" height="10" rx="3" fill="${c}" opacity="0.2" stroke="${c}" stroke-width="1.5"/>
      <rect x="6" y="20" width="8" height="6" rx="2" fill="${c}" opacity="0.4"/>
      <line x1="36" y1="23" x2="42" y2="23" stroke="${c}" stroke-width="2"/>
      <path d="M22 28 Q22 36 16 36 Q10 36 10 28" stroke="${c}" stroke-width="1.5" fill="none"/>
    </svg>`;

  // Decorating
  if (s.match(/decor|pintando|personali|desenhe|rosto|bonec/)) return `
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="18" cy="18" r="8" fill="${c}" opacity="0.25" stroke="${c}" stroke-width="1.5"/>
      <circle cx="32" cy="24" r="6" fill="${c}" opacity="0.15" stroke="${c}" stroke-width="1"/>
      <circle cx="22" cy="34" r="5" fill="${c}" opacity="0.1" stroke="${c}" stroke-width="1"/>
    </svg>`;

  // Default: gear
  return `
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="10" fill="${c}" opacity="0.15" stroke="${c}" stroke-width="2"/>
      <circle cx="22" cy="22" r="4" fill="${c}"/>
      <path d="M22 8 L22 12 M22 32 L22 36 M8 22 L12 22 M32 22 L36 22 M13 13 L16 16 M28 28 L31 31 M31 13 L28 16 M16 28 L13 31" stroke="${c}" stroke-width="1.8" stroke-linecap="round"/>
    </svg>`;
}

function openModal(id) {
  const p = projects[id];
  const pd = p[lang];
  const dd = details[id][lang];
  const overlay = document.getElementById('modal');
  const content = document.getElementById('modal-content');

  const levelColors = { iniciante: '#00e676', intermediario: '#f5c842', avancado: '#ff9800' };
  const lc = levelColors[pd.level] || '#00d4ff';

  // ── Hero ──
  const heroHtml = `
    <div class="modal-hero">
      <button class="modal-hero-close" onclick="closeModal()">✕</button>
      <div class="modal-hero-row">
        <div class="modal-hero-art">${p.icon||''}</div>
        <div class="modal-hero-info">
          <div class="modal-hero-tag">${pd.num}</div>
          <div class="modal-hero-title">${pd.title}</div>
          <div class="modal-hero-badges">
            <span class="hero-badge">📊 <strong style="color:${lc}">${pd.levelLabel}</strong></span>
            ${pd.time && pd.time !== '—' ? `<span class="hero-badge">⏱ <strong>${pd.time}</strong></span>` : ''}
            <span class="hero-badge">📋 <strong>${pd.stages}</strong> ${lang==='pt'?'etapas':'etapas'}</span>
          </div>
        </div>
      </div>
    </div>`;

  let body = '';

  if (p.isGuia) {
    body = `
      <div class="modal-body">
        <div class="modal-section"><p class="modal-desc">${dd.desc}</p></div>
        <div class="modal-section">
          <div class="modal-section-title"><span class="icon">📖</span>${t('capitulos')}</div>
          <ul class="chapters-list">
            ${dd.chapters.map(ch => `<li><span class="ch-num">${ch.num}</span><div><div class="ch-title">${ch.title}</div><div class="ch-desc">${ch.desc}</div></div></li>`).join('')}
          </ul>
        </div>
        <div class="modal-section">
          <div class="modal-section-title"><span class="icon">📚</span>${t('glossario')}</div>
          <div class="glossary-grid">${dd.glossary.map(g => `<div class="gloss-item"><div class="gloss-term">${g.term}</div><div class="gloss-def">${g.def}</div></div>`).join('')}</div>
        </div>
        <div class="modal-section">
          <div class="modal-section-title"><span class="icon">🛒</span>${t('onde_comprar')}</div>
          <div class="links-grid">${dd.links.map(l => `<span class="link-chip">🔍 ${l}</span>`).join('')}</div>
          <p style="font-size:0.75rem;color:var(--muted);margin-top:10px;">Pesquise esses termos no Mercado Livre / Busca estos términos en Mercado Libre</p>
        </div>
        <div class="tip-box"><strong>💡 </strong>${dd.tip}</div>
      </div>`;
  } else {
    // ── Materials ──
    const matHtml = dd.materials.map(m =>
      `<div class="mat-item"><span class="mat-icon">${matIcon(m)}</span><span class="mat-text">${m}</span></div>`
    ).join('');

    // ── Tools ──
    const toolHtml = dd.tools.map(tool =>
      `<span class="tool-pill"><span class="tool-pill-icon">${toolIcon(tool)}</span>${tool}</span>`
    ).join('');

    // ── Steps ──
    const stepColors = STEP_PALETTE;
    const stepsHtml = dd.stages.map((s, i) => {
      const c = stepColors[i % stepColors.length];
      const cleanTitle = s.title.replace(/^Passo\s+\d+\s*[—–-]\s*/i,'').replace(/^Paso\s+\d+\s*[—–-]\s*/i,'');
      return `
        <div class="step-card">
          <div class="step-accent" style="background:${c}"></div>
          <div class="step-inner">
            <div class="step-num" style="background:${c}">${i+1}</div>
            <div class="step-body">
              <div class="step-title">${cleanTitle}</div>
              <div class="step-desc">${s.desc}</div>

    const extraHtml = dd.extras.map(e =>

    ).join('');

    body = `
      <div class="modal-body-v2">
        <div class="modal-desc-v2">${dd.desc}</div>

        <div class="section-block">
          <div class="section-head">
            <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/><rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor"/><rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor"/><rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/></svg>
            ${t('materiais')}

          <div class="mat-grid">${matHtml}</div>

            <svg viewBox="0 0 16 16" fill="none"><path d="M11 2 L14 5 L6 13 L2 13 L2 9 Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
            ${t('ferramentas')}
          </div>
          <div class="tool-pills">${toolHtml}</div>
        </div>

        <div class="section-block">
          <div class="section-head">
            <svg viewBox="0 0 16 16" fill="none"><path d="M2 4 L8 8 L14 4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            ${t('passo_a_passo')}
          </div>
          <div class="steps-list">${stepsHtml}</div>
        </div>

        <div class="section-block">
          <div class="section-head">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5 L8 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="0.8" fill="currentColor"/></svg>
            ${t('erros_comuns')}
          </div>
          <div class="err-list">${errHtml}</div>
        </div>

        <div class="section-block">
          <div class="section-head">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 2 L10 6 L14 6 L11 9 L12 13 L8 11 L4 13 L5 9 L2 6 L6 6 Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
            ${t('dicas_seguranca')}
          </div>
          <div class="safety-cards">${safeHtml}</div>
        </div>

        <div class="section-block">
          <div class="section-head">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 1 L10 6 L15 6 L11 9.5 L12.5 15 L8 12 L3.5 15 L5 9.5 L1 6 L6 6 Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
            ${t('desafios_extras')}
          </div>
          <div class="extras-cards">${extraHtml}</div>
        </div>
      </div>`;
  }

  content.innerHTML = heroHtml + body;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* ── step type ── */
function getStepType(title) {
  var s = (title||'').toLowerCase();
  if (s.match(/ligaç|elétric|circuito|fio|bateria|pilha|interruptor|conecte|cables|led/)) return {icon:'⚡',label:'Elétrico',color:'#00d4ff'};
  if (s.match(/test|ligue|liga|verifica|funciona|pronto|ligar/)) return {icon:'✅',label:'Teste',color:'#00e676'};
  if (s.match(/recorte|corte|medir|preparando|base|medindo|régua/)) return {icon:'✂️',label:'Preparo',color:'#ff9800'};
  if (s.match(/decor|pintando|personali|rosto|desenh|tinta/)) return {icon:'🎨',label:'Decoração',color:'#a78bfa'};
  if (s.match(/seringa|hidráulic|mangueira|pressão/)) return {icon:'💧',label:'Hidráulico',color:'#38bdf8'};
  return {icon:'⚙️',label:'Montagem',color:'#f5c842'};
}

/* ── pro tip per step ── */
function getStepTip(title, desc) {
  var s = (title+' '+desc).toLowerCase();
  if (s.match(/elétric|fio|bateria|circuito|ligaç|led/)) return 'Verifique a polaridade (+ e −) antes de conectar. Um fio invertido pode queimar o motor ou LED.';
  if (s.match(/test|ligue|verifica|funciona/)) return 'Se não ligar, revise as conexões uma a uma. 90% dos problemas são fio solto ou polaridade errada.';
  if (s.match(/cola|silicona|fixe|prenda|grude/)) return 'Aguarde 2 minutos para a cola secar antes de continuar. Cola mal seca gera folga no projeto.';
  if (s.match(/recorte|corte|medir/)) return 'Meça duas vezes, corte uma. Um erro de medição no início compromete todo o projeto.';
  if (s.match(/motor|hélice|roda|eixo/)) return 'Verifique se o eixo gira livremente antes de fixar. Apertar demais pode travar o mecanismo.';
  if (s.match(/seringa|hidráulic|mangueira/)) return 'Elimine bolhas de ar da mangueira antes de usar. Ar reduz a força hidráulica pela metade.';
  if (s.match(/decor|pintando|rosto/)) return 'Deixe camadas de tinta secarem completamente entre aplicações para resultado mais bonito.';
  return 'Siga o passo com atenção antes de avançar. Um passo bem feito facilita todos os seguintes.';
}

/* ── learning concepts ── */
function getConceptBadges(s) {
  s = s.toLowerCase();
  var b = [];
  if (s.match(/motor|elétric|bateria|circuito|corrente|fio|interruptor/)) b.push({icon:'⚡',label:'Circuito Elétrico'});
  if (s.match(/roda|eixo|engrenagem|polia|correia|transmissão/)) b.push({icon:'⚙️',label:'Mecânica'});
  if (s.match(/hélice|aerodinâm|vento|sustentação/)) b.push({icon:'🌀',label:'Aerodinâmica'});
  if (s.match(/seringa|hidráulic|pressão|fluido/)) b.push({icon:'💧',label:'Hidráulica'});
  if (s.match(/imã|magnét|eletromagnét/)) b.push({icon:'🧲',label:'Eletromagnetismo'});
  if (s.match(/polia|alavanca|rampa|máquina simples/)) b.push({icon:'🔧',label:'Máquinas Simples'});
  if (s.match(/led|luz|óptic|brilh/)) b.push({icon:'💡',label:'Óptica'});
  if (s.match(/energia|conversão|potência|trabalho/)) b.push({icon:'🔋',label:'Energia'});
  if (b.length === 0) b.push({icon:'🔬',label:'Engenharia'});
  if (b.length < 2) b.push({icon:'🏗️',label:'Construção'});
  return b.slice(0,4);
}

  } else {
    var conceptsStr = dd.materials.join(' ')+' '+dd.desc;
    var concepts = getConceptBadges(conceptsStr);
    var conceptHtml = concepts.map(function(b){
      var subs = isPT ? 'Conceito aprendido' : 'Concepto aprendido';
      return '<div class="cb"><span class="cbicon">'+b.icon+'</span><div><div class="cblabel">'+b.label+'</div><div class="cbsub">'+subs+'</div></div></div>';
    }).join('');

    var matHtml = dd.materials.map(function(m){return '<div class="mi"><span class="mico">'+matIcon(m)+'</span><span class="mname">'+m+'</span></div>';}).join('');
    var toolHtml = dd.tools.map(function(tl){return '<span class="tp"><span>'+toolIcon(tl)+'</span>'+tl+'</span>';}).join('');

    var totalSteps = dd.stages.length;
    var progLbl = isPT ? (totalSteps+' passos no total') : (totalSteps+' pasos en total');
    var doneCount = isPT ? '0 concluídos' : '0 completados';
    var stepsHtml = dd.stages.map(function(st, i) {
      var c = STEP_PALETTE[i % STEP_PALETTE.length];
      var stype = getStepType(st.title);
      var tip = getStepTip(st.title, st.desc);
      var stime = stepTimeMap(st.title);
      var title = st.title.replace(/^(Passo|Paso)\s+\d+\s*[-—–]\s*/i, '');
      var stepOf = isPT ? ('Passo '+(i+1)+' de '+totalSteps) : ('Paso '+(i+1)+' de '+totalSteps);
      var tipLbl = isPT ? '💡 DICA PRO' : '💡 CONSEJO PRO';
      return '<div class="sc" id="step-'+i+'" style="border-left:5px solid '+c+'">'+
        '<div class="sleft">'+
          '<div class="smeta">'+
            '<div class="schk" id="chk-'+i+'" onclick="markStep('+i+','+totalSteps+')" title="Marcar como feito">✓</div>'+
            '<span class="stype" style="color:'+stype.color+';border-color:'+stype.color+';background:'+stype.color+'18">'+stype.icon+' '+stype.label+'</span>'+
            '<span class="stime">⏱ '+stime+'</span>'+
            '<span class="snum-lbl">'+stepOf+'</span>'+
          '</div>'+
          '<div class="shtop">'+
            '<div class="sn" style="background:'+c+'">'+(i+1)+'</div>'+
            '<div class="stxt"><h4>'+title+'</h4><p>'+st.desc+'</p></div>'+
          '</div>'+
          '<div class="stip"><div class="stip-lbl">'+tipLbl+'</div><div class="stip-txt">'+tip+'</div></div>'+
        '</div>'+
        '<div class="sill">'+bigStepSvg(st.title,i)+'</div>'+
      '</div>';
    }).join('');

    var errHtml = dd.errors.map(function(e){
      return '<div class="ec"><div class="eh">❌ '+e.p+'</div><div class="eb">'+
        '<div class="ecol"><div class="ect cause">🔍 '+L.causa+'</div><div class="ecv">'+e.c+'</div></div>'+
        '<div class="ecol"><div class="ect sol">✅ '+L.solucao+'</div><div class="ecv">'+e.s+'</div></div>'+
      '</div></div>';
    }).join('');
    var safeHtml = dd.safety.map(function(s){return '<div class="sfitem"><span class="ico">⚠️</span>'+s+'</div>';}).join('');
    var extraHtml = dd.extras.map(function(e){return '<div class="xitem"><span class="ico">⭐</span>'+e+'</div>';}).join('');

    var learnTitle = isPT ? 'O que você vai aprender' : 'Lo que aprenderás';
    var bpTitle = isPT ? '🔷 Visualização do Projeto Completo' : '🔷 Visualización del Proyecto Completo';
    var matTitle = isPT ? '📦 Lista de Materiais' : '📦 Lista de Materiales';
    var toolTitle = isPT ? '🔧 Ferramentas Necessárias' : '🔧 Herramientas Necesarias';
    var stepsTitle = isPT ? '⚙️ Montagem Passo a Passo' : '⚙️ Ensamblaje Paso a Paso';
    var errTitle = isPT ? '❗ Erros Comuns e Soluções' : '❗ Errores Comunes y Soluciones';
    var safeTitle = isPT ? '🛡️ Dicas de Segurança' : '🛡️ Consejos de Seguridad';
    var extraTitle = isPT ? '⭐ Desafios Extras' : '⭐ Desafíos Extra';

    bodyHtml = '<div class="wrap">'+
      '<div class="bp"><div class="bph">'+bpTitle+'</div><div class="bpsvg">'+projectBlueprintSvg(dd)+'</div></div>'+
      '<div class="sec"><div class="stitle">🎓 '+learnTitle+'</div><div class="crow">'+conceptHtml+'</div></div>'+
      '<div class="sec"><div class="stitle">'+matTitle+'</div><div class="mgrid">'+matHtml+'</div></div>'+
      '<div class="sec"><div class="stitle">'+toolTitle+'</div><div class="tpills">'+toolHtml+'</div></div>'+
      '<div class="sec"><div class="stitle">'+stepsTitle+'</div>'+
        '<div class="sprg"><div class="sprg-lbl"><span id="done-lbl">'+doneCount+'</span><span>'+progLbl+'</span></div><div class="sprg-bar"><div class="sprg-fill" id="prog-fill"></div></div></div>'+
        '<div class="slist">'+stepsHtml+'</div>'+
      '</div>'+
      '<div class="sec"><div class="stitle">'+errTitle+'</div><div class="elist">'+errHtml+'</div></div>'+
      '<div class="two">'+
        '<div class="sec"><div class="stitle">'+safeTitle+'</div><div class="sflist">'+safeHtml+'</div></div>'+
        '<div class="sec"><div class="stitle">'+extraTitle+'</div><div class="xlist">'+extraHtml+'</div></div>'+
      '</div>'+
      '</div>';
  }

  var timeLabel = (pd.time && pd.time !== '—') ? pd.time + ' ' + L.hrs : '—';
  var heroHtml = '<div class="hero"><div class="hi">'+
    '<div class="ha">'+(p.icon||'')+'</div>'+
    '<div>'+
      '<div class="htag">'+pd.num+'</div>'+
      '<div class="htitle">'+pd.title+'</div>'+
      '<div class="hbadges">'+
        '<span class="hb">📊 <strong style="color:'+lc+'">'+pd.levelLabel+'</strong></span>'+
        (timeLabel!=='—'?'<span class="hb">⏱ <strong>'+timeLabel+'</strong></span>':'')+
        '<span class="hb">📋 <strong>'+dd.stages.length+'</strong> '+L.stagesLbl+'</span>'+
        (dd.materials?'<span class="hb">📦 <strong>'+dd.materials.length+'</strong> '+L.mats+'</span>':'')+
        (dd.tools?'<span class="hb">🔧 <strong>'+dd.tools.length+'</strong> '+(isPT?'ferramentas':'herramientas')+'</span>':'')+
        '<span class="hb">❗ <strong>'+dd.errors.length+'</strong> '+(isPT?'erros comuns':'errores comunes')+'</span>'+
      '</div>'+
      '<div class="hdesc">'+dd.desc+'</div>'+
    '</div>'+
  '</div></div>';

  var checkJS = 'function markStep(i,total){'+
    'var chk=document.getElementById("chk-"+i);'+
    'var card=document.getElementById("step-"+i);'+
    'chk.classList.toggle("done");'+
    'card.classList.toggle("done-step");'+
    'var done=document.querySelectorAll(".schk.done").length;'+
    'var pct=Math.round(done/total*100);'+
    'document.getElementById("prog-fill").style.width=pct+"%";'+
    'document.querySelector("#prog-fill").closest(".sprg").querySelector(".sprg-fill").style.width=pct+"%";'+
    'var navFill=document.getElementById("nav-prog-fill");'+
    'if(navFill)navFill.style.width=pct+"%";'+
    'var doneLbl=document.getElementById("done-lbl");'+
    'if(doneLbl)doneLbl.textContent=done+" '+(isPT?'concluído(s)':'completado(s)')+'";'+
    'var navPct=document.getElementById("nav-pct");'+
    'if(navPct)navPct.textContent=pct+"% '+(isPT?'concluído':'completado')+'";'+
  '}';

  return '<!DOCTYPE html><html lang="'+dLang+'"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+
    '<title>'+pd.title+' — Kit Mestre da Rob&#243;tica</title>'+
    '<style>'+CSS+'</style></head><body>'+
    '<nav class="nav">'+
      '<button class="nb" onclick="window.close()">← '+L.back+'</button>'+
      '<div class="nprog"><div class="npfill" id="nav-prog-fill"></div></div>'+
      '<span class="npct" id="nav-pct">0% '+(isPT?'concluído':'completado')+'</span>'+
      '<div class="nbrand">Kit Mestre da Rob&#243;tica</div>'+
    '</nav>'+
    heroHtml + bodyHtml +
    '<div class="pfoot">'+L.footer+'</div>'+
    '<script>'+checkJS+'<\/script>'+
    '</body></html>';
}

/* ── open project in new tab ── */
function openProject(id) {
  var html = buildProjectPage(id);
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  window.open(URL.createObjectURL(blob), '_blank');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

setLang(lang);
</script>
